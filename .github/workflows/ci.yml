name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gen-testdata:
    name: gen-testdata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: tools/gen-testdata/go.sum
      - name: Verify conformance generator
        working-directory: tools/gen-testdata
        run: go run .

  python:
    name: python
    runs-on: ubuntu-latest
    needs: gen-testdata
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: python/pyproject.toml
      - name: Install and test
        working-directory: python
        run: |
          pip install -e ".[dev]"
          pytest

  java:
    name: java
    runs-on: ubuntu-latest
    needs: gen-testdata
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Test
        working-directory: java
        run: mvn -B test

  csharp:
    name: csharp
    runs-on: ubuntu-latest
    needs: gen-testdata
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Test
        working-directory: csharp
        run: dotnet test -v minimal

  rust:
    name: rust
    runs-on: ubuntu-latest
    needs: gen-testdata
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Test
        working-directory: rust
        run: cargo test

  php:
    name: php
    runs-on: ubuntu-latest
    needs: gen-testdata
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: intl
          coverage: none
      - name: Install and test
        working-directory: php
        run: |
          composer install --no-interaction --prefer-dist
          vendor/bin/phpunit

  ruby:
    name: ruby
    runs-on: ubuntu-latest
    needs: gen-testdata
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: false
      - name: Test
        working-directory: ruby
        run: |
          gem install minitest
          ruby -Itest test/test_conformance.rb test/test_encoder.rb

  nodejs:
    name: nodejs
    runs-on: ubuntu-latest
    needs: gen-testdata
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Test
        working-directory: nodejs
        run: npm test

  cpp:
    name: cpp
    runs-on: ubuntu-latest
    needs: gen-testdata
    steps:
      - uses: actions/checkout@v4
      - name: Build and test
        working-directory: cpp
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build
          ctest --test-dir build --output-on-failure
